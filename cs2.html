<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>syntcs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 3rem;
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.3),
        0 0 20px rgba(255, 255, 255, 0.15),
        0 0 40px rgba(255, 255, 255, 0.05);
      margin-bottom: 0.75rem;
      letter-spacing: 4px;
      font-weight: 700;
      animation: subtleGlow 4s ease-in-out infinite;
    }

    @keyframes subtleGlow {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.3),
          0 0 20px rgba(255, 255, 255, 0.15);
      }
      50% {
        text-shadow:
          0 0 15px rgba(255, 255, 255, 0.4),
          0 0 30px rgba(255, 255, 255, 0.2);
      }
    }

    .subtitle {
      color: #8b949e;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* Section header with // prefix */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-size: 1.25rem;
      color: #f0f6fc;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
    }

    .section-title::before {
      content: "//";
      color: #58a6ff;
    }

    /* Cards grid container — same glass box style */
    .cards-box {
      background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.3),
        0 0 30px rgba(255, 255, 255, 0.02),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .cards-box:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow:
        0 4px 25px rgba(0, 0, 0, 0.4),
        0 0 40px rgba(255, 255, 255, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* Individual card */
    .card {
      position: relative;
      background: linear-gradient(145deg, rgba(28, 33, 40, 0.9), rgba(22, 27, 34, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 1.5rem 1.25rem 1.5rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.3s ease;
      min-height: 100px;
    }

    .card:hover {
      border-color: rgba(88, 166, 255, 0.4);
      background: linear-gradient(145deg, rgba(28, 33, 40, 0.95), rgba(22, 27, 34, 1));
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.3),
        0 0 20px rgba(88, 166, 255, 0.06);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #79c0ff;
      margin-bottom: 0.4rem;
    }

    .card-description {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.5;
    }

    /* Badge */
    .badge {
      position: absolute;
      top: -10px;
      right: 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .badge-green {
      background: #238636;
      color: #ffffff;
      box-shadow: 0 0 8px rgba(35, 134, 54, 0.5);
    }

    .badge-orange {
      background: #b45309;
      color: #fef3c7;
      box-shadow: 0 0 8px rgba(180, 83, 9, 0.5);
    }

    .badge-blue {
      background: #1f6feb;
      color: #ffffff;
      box-shadow: 0 0 8px rgba(31, 111, 235, 0.5);
    }

    .badge-red {
      background: #b91c1c;
      color: #fee2e2;
      box-shadow: 0 0 8px rgba(185, 28, 28, 0.5);
    }

    /* Editor link */
    .editor-row {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 -1px 20px rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: center;
    }

    .editor-btn {
      background: rgba(33, 38, 45, 0.8);
      color: #e6edf3;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
    }

    .editor-btn:hover {
      background-color: rgba(48, 54, 61, 0.9);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    /* Empty / loading states */
    .state-msg {
      color: #6e7681;
      font-size: 0.875rem;
      text-align: center;
      padding: 2rem 0;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="page-title">syntcs</h1>
      <p class="subtitle" id="page-subtitle">CS2 Tools &amp; Resources</p>
    </header>

    <div>
      <div class="section-header">
        <h2 class="section-title" id="section-label">Pages</h2>
      </div>

      <div class="cards-box">
        <div class="cards-grid" id="cards-grid">
          <div class="state-msg">Loading...</div>
        </div>
      </div>
    </div>

    <div class="editor-row">
      <a class="editor-btn" href="indexeditor.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        Edit Page
      </a>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('index-data.json?t=' + Date.now());
        const data = await res.json();

        document.getElementById('page-title').textContent = data.title || 'syntcs';
        document.getElementById('page-subtitle').textContent = data.subtitle || '';
        document.title = data.title || 'syntcs';

        const grid = document.getElementById('cards-grid');
        const cards = (data.cards || []).filter(c => c.enabled !== false);

        if (cards.length === 0) {
          grid.innerHTML = '<div class="state-msg">No pages configured yet.</div>';
          return;
        }

        grid.innerHTML = cards.map(card => {
          const badgeHtml = card.badge
            ? `<span class="badge badge-${card.badgeColor || 'green'}">${card.badge}</span>`
            : '';
          return `
            <a class="card" href="${card.url || '#'}">
              ${badgeHtml}
              <div class="card-title">${card.title}</div>
              <div class="card-description">${card.description || ''}</div>
            </a>
          `;
        }).join('');

      } catch (e) {
        document.getElementById('cards-grid').innerHTML =
          '<div class="state-msg">Could not load data.</div>';
      }
    }

    loadData();
  </script>
</body>
</html>
