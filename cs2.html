<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>syntcs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f78166;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Title */
        .hub-title {
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 3px;
            text-align: center;
            animation: titleGlow 4s ease-in-out infinite;
            margin-bottom: 12px;
        }

        @keyframes titleGlow {
            0%, 100% {
                text-shadow:
                    0 0 10px rgba(88, 166, 255, 0.4),
                    0 0 30px rgba(88, 166, 255, 0.2),
                    0 0 60px rgba(88, 166, 255, 0.08);
            }
            50% {
                text-shadow:
                    0 0 20px rgba(88, 166, 255, 0.6),
                    0 0 50px rgba(88, 166, 255, 0.3),
                    0 0 90px rgba(88, 166, 255, 0.12);
            }
        }

        .hub-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 60px;
        }

        /* Outer container */
        .hub-container {
            width: 100%;
            max-width: 900px;
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(6px);
        }

        /* Cards grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            position: relative;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 28px 24px 32px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            min-height: 120px;
        }

        .card:hover {
            border-color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.05);
            transform: translateY(-3px);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .card-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Badge */
        .badge {
            position: absolute;
            top: -10px;
            right: 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .badge-green {
            background: #238636;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.4);
        }

        .badge-orange {
            background: #b45309;
            color: #fef3c7;
            box-shadow: 0 0 10px rgba(247, 129, 102, 0.4);
        }

        .badge-blue {
            background: #1f6feb;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.4);
        }

        .badge-red {
            background: #b91c1c;
            color: #fee2e2;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* Editor link at bottom */
        .editor-link {
            display: flex;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .editor-link a {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: color 0.2s, border-color 0.2s;
        }

        .editor-link a:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 0;
            font-size: 14px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h1 class="hub-title" id="hub-title">syntcs</h1>
    <p class="hub-subtitle" id="hub-subtitle">CS2 Tools &amp; Resources</p>

    <div class="hub-container">
        <div class="cards-grid" id="cards-grid">
            <div class="loading">Loading...</div>
        </div>
        <div class="editor-link">
            <a href="indexeditor.html">Edit Page</a>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('index-data.json?t=' + Date.now());
                const data = await res.json();

                // Update title & subtitle
                document.getElementById('hub-title').textContent = data.title || 'syntcs';
                document.getElementById('hub-subtitle').textContent = data.subtitle || '';
                document.title = data.title || 'syntcs';

                const grid = document.getElementById('cards-grid');
                const cards = (data.cards || []).filter(c => c.enabled !== false);

                if (cards.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No pages configured yet.</div>';
                    return;
                }

                grid.innerHTML = cards.map(card => {
                    const badgeHtml = card.badge
                        ? `<span class="badge badge-${card.badgeColor || 'green'}">${card.badge}</span>`
                        : '';
                    return `
                        <a class="card" href="${card.url || '#'}">
                            ${badgeHtml}
                            <div class="card-title">${card.title}</div>
                            <div class="card-description">${card.description || ''}</div>
                        </a>
                    `;
                }).join('');

            } catch (e) {
                document.getElementById('cards-grid').innerHTML =
                    '<div class="empty-state">Could not load data.</div>';
            }
        }

        loadData();
    </script>

</body>
</html>
