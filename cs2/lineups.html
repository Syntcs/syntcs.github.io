<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Lineups - Smoke Lineup Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-orange: #f78166;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
            color: #e6edf3;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .site-header {
            background: var(--bg-secondary);
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.15),
                0 0 40px rgba(255, 255, 255, 0.05);
            letter-spacing: 2px;
            animation: subtleGlow 4s ease-in-out infinite;
        }

        @keyframes subtleGlow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 255, 255, 0.15); 
            }
            50% { 
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.2); 
            }
        }

        .back-btn {
            background-color: rgba(33, 38, 45, 0.8);
            color: #e6edf3;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: none;
        }

        .back-btn:hover {
            background-color: rgba(48, 54, 61, 0.9);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .back-btn.visible {
            display: block;
        }

        /* Home View */
        #home-view {
            padding: 60px 0;
        }

        .page-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 700;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .map-card {
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .map-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 4px 25px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .map-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .map-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .map-card:hover .map-image img {
            transform: scale(1.1);
        }

        .map-name {
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        /* Map View */
        #map-view {
            display: none;
            padding: 40px 0;
        }

        #map-view.active {
            display: block;
        }

        .map-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .map-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .map-instructions {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .map-instructions.highlight {
            color: var(--accent-orange);
            font-weight: 600;
        }

        /* Interactive Map Container */
        .interactive-map-container {
            max-width: 1000px;
            margin: 0 auto 40px;
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .map-canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
        }

        .map-canvas {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .map-point {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        .map-point.start {
            background: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.6);
        }

        .map-point.target {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            box-shadow: 0 0 20px rgba(251, 146, 60, 0.6);
            display: none;
        }

        .map-point.target.visible {
            display: flex;
        }

        .map-point:hover {
            transform: translate(-50%, -50%) scale(1.3);
        }

        .map-point.selected {
            width: 32px;
            height: 32px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        /* Lineup Results */
        .lineup-results {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
        }

        .lineup-results.visible {
            display: block;
        }

        .lineup-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .lineup-header h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--accent-green);
        }

        .lineup-route {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .lineup-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .lineup-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .lineup-item:hover {
            transform: translateY(-4px);
            border-color: var(--accent-green);
        }

        .lineup-media {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .lineup-media img,
        .lineup-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lineup-description {
            padding: 20px;
        }

        .lineup-description h4 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--accent-orange);
        }

        .lineup-description p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Footer */
        .site-footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 60px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 28px;
            }

            .map-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }

            .map-title {
                font-size: 24px;
            }

            .lineup-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">CS2 Lineups</h1>
                <button id="back-btn" class="back-btn">Back to Map Selection</button>
            </div>
        </div>
    </header>

    <!-- Home View - Map Selection -->
    <div id="home-view">
        <main class="container">
            <h2 class="page-title">Select a Map</h2>
            <div class="map-grid" id="map-grid"></div>
        </main>
    </div>

    <!-- Map View - Interactive Lineup Viewer -->
    <div id="map-view">
        <main class="container">
            <div class="map-header">
                <h2 class="map-title" id="current-map-title"></h2>
                <p class="map-instructions" id="map-instructions">Select a start point (green)</p>
            </div>

            <div class="interactive-map-container">
                <div class="map-canvas-wrapper">
                    <div class="map-canvas" id="map-canvas"></div>
                </div>
            </div>

            <div class="lineup-results" id="lineup-results">
                <div class="lineup-header">
                    <h3>Lineup Found</h3>
                    <p class="lineup-route" id="lineup-route"></p>
                </div>
                <div class="lineup-content" id="lineup-content"></div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p><a href="https://steamcommunity.com/id/syntcs/" target="_blank" style="color: inherit; text-decoration: none;">https://steamcommunity.com/id/syntcs/</a></p>
        </div>
    </footer>

    <script>
        // Global state
        let lineupsData = null;
        let currentMap = null;
        let selectedStart = null;
        let selectedTarget = null;

        // Initialize app
        async function init() {
            await loadLineups();
            renderMapGrid();
            setupEventListeners();
        }

        // Load lineups from JSON
        async function loadLineups() {
            try {
                console.log('[v0] Loading lineups.json...');
                const response = await fetch('lineups.json');
                lineupsData = await response.json();
                console.log('[v0] Lineups loaded:', lineupsData);
            } catch (error) {
                console.error('[v0] Error loading lineups:', error);
            }
        }

        // Render map grid on home page
        function renderMapGrid() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            
            if (!lineupsData || !lineupsData.maps) return;

            lineupsData.maps.forEach(map => {
                const card = document.createElement('div');
                card.className = 'map-card';
                card.onclick = () => openMap(map.id, map.name);
                
                const imageUrl = map.previewImage || `public/images/maps/${map.id}.jpg`;
                
                card.innerHTML = `
                    <div class="map-image">
                        <img src="${imageUrl}" alt="${map.name}">
                    </div>
                    <h3 class="map-name">${map.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // Open map view
        function openMap(mapId, mapName) {
            currentMap = mapId;
            selectedStart = null;
            selectedTarget = null;

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('map-view').classList.add('active');
            document.getElementById('back-btn').classList.add('visible');
            document.getElementById('current-map-title').textContent = mapName;
            document.getElementById('map-instructions').textContent = 'Select a start point (green)';
            document.getElementById('map-instructions').classList.remove('highlight');
            document.getElementById('lineup-results').classList.remove('visible');

            renderMapCanvas(mapId);
        }

        // Render interactive map with points
        function renderMapCanvas(mapId) {
            console.log('[v0] Rendering map canvas for:', mapId);
            const canvas = document.getElementById('map-canvas');
            
            const mapData = lineupsData.maps.find(m => m.id === mapId);
            console.log('[v0] Map data found:', mapData);
            if (!mapData) {
                console.error('[v0] No map data found for:', mapId);
                return;
            }
            
            const overlayImage = mapData.overlayImage || `public/images/maps/${mapId}.jpg`;
            canvas.style.backgroundImage = `url('${overlayImage}')`;
            canvas.innerHTML = '';

            // Render start points
            console.log('[v0] Rendering start points:', mapData.startPoints.length);
            mapData.startPoints.forEach(point => {
                const pointEl = createMapPoint(point, 'start');
                pointEl.onclick = () => selectStartPoint(point);
                canvas.appendChild(pointEl);
            });

            // Render target points (hidden initially)
            console.log('[v0] Rendering target points:', mapData.targetPoints.length);
            mapData.targetPoints.forEach(point => {
                const pointEl = createMapPoint(point, 'target');
                pointEl.onclick = () => selectTargetPoint(point);
                canvas.appendChild(pointEl);
            });
        }

        // Create map point element
        function createMapPoint(point, type) {
            const pointEl = document.createElement('div');
            pointEl.className = `map-point ${type}`;
            pointEl.style.left = `${point.x}%`;
            pointEl.style.top = `${point.y}%`;
            pointEl.dataset.id = point.id;
            pointEl.textContent = point.label;
            return pointEl;
        }

        // Select start point
        function selectStartPoint(point) {
            console.log('[v0] Selected start point:', point);
            selectedStart = point;
            selectedTarget = null;

            // Update UI
            document.querySelectorAll('.map-point.start').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector(`.map-point.start[data-id="${point.id}"]`).classList.add('selected');

            // Show only target points that have lineups
            const mapData = lineupsData.maps.find(m => m.id === currentMap);
            const availableTargets = mapData.lineups
                .filter(l => l.from === point.id)
                .map(l => l.to);
            
            console.log('[v0] Available targets for', point.id, ':', availableTargets);

            document.querySelectorAll('.map-point.target').forEach(el => {
                const targetId = el.dataset.id;
                if (availableTargets.includes(targetId)) {
                    el.classList.add('visible');
                } else {
                    el.classList.remove('visible');
                }
            });

            document.getElementById('map-instructions').textContent = 'Now select a target point (orange)';
            document.getElementById('map-instructions').classList.add('highlight');
            document.getElementById('lineup-results').classList.remove('visible');
        }

        // Select target point
        function selectTargetPoint(point) {
            selectedTarget = point;

            // Update UI
            document.querySelectorAll('.map-point.target').forEach(el => {
                el.classList.remove('selected');
            });
            document.querySelector(`.map-point.target[data-id="${point.id}"]`).classList.add('selected');

            document.getElementById('map-instructions').textContent = 'Lineup displayed';
            showLineupResults();
        }

        // Show lineup results
        function showLineupResults() {
            console.log('[v0] Showing lineup results for:', selectedStart.id, '->', selectedTarget.id);
            const mapData = lineupsData.maps.find(m => m.id === currentMap);
            if (!mapData) {
                console.error('[v0] No map data found');
                return;
            }

            const lineup = mapData.lineups.find(l => 
                l.from === selectedStart.id && l.to === selectedTarget.id
            );

            console.log('[v0] Lineup found:', lineup);

            if (!lineup || !lineup.media || lineup.media.length === 0) {
                console.warn('[v0] No lineup or media found for this combination');
                document.getElementById('lineup-results').classList.remove('visible');
                document.getElementById('map-instructions').textContent = 'No lineup available for this combination';
                return;
            }

            document.getElementById('lineup-route').textContent = 
                `From ${selectedStart.name} to ${selectedTarget.name}`;

            const content = document.getElementById('lineup-content');
            content.innerHTML = '';

            lineup.media.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'lineup-item';

                let mediaHtml = '';
                if (item.type === 'image') {
                    mediaHtml = `<img src="${item.url}" alt="${item.description}">`;
                } else if (item.type === 'video') {
                    mediaHtml = `<video controls><source src="${item.url}" type="video/mp4"></video>`;
                }

                itemEl.innerHTML = `
                    <div class="lineup-media">
                        ${mediaHtml}
                    </div>
                    <div class="lineup-description">
                        <h4>Step ${index + 1}</h4>
                        <p>${item.description}</p>
                    </div>
                `;

                content.appendChild(itemEl);
            });

            document.getElementById('lineup-results').classList.add('visible');
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('back-btn').onclick = () => {
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('map-view').classList.remove('active');
                document.getElementById('back-btn').classList.remove('visible');
                currentMap = null;
                selectedStart = null;
                selectedTarget = null;
            };
        }

        // Start app
        init();
    </script>
</body>
</html>
