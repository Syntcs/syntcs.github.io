<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="public/icon.png" type="image/png">
    <title>CS2 Lineups | syntcs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-orange: #f78166;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
            color: #e6edf3;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .site-header {
            background: var(--bg-secondary);
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(255, 255, 255, 0.15),
                0 0 40px rgba(255, 255, 255, 0.05);
            letter-spacing: 2px;
            animation: subtleGlow 4s ease-in-out infinite;
        }

        @keyframes subtleGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 255, 255, 0.15);
            }
            50% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.2);
            }
        }

        .back-btn {
            background-color: rgba(33, 38, 45, 0.8);
            color: #e6edf3;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: none;
        }

        .back-btn:hover {
            background-color: rgba(48, 54, 61, 0.9);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .back-btn.visible {
            display: block;
        }

        /* Home View */
        #home-view {
            padding: 60px 0;
        }

        .page-title {
            font-size: 36px;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 700;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .map-card {
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .map-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow:
                0 4px 25px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .map-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .map-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .map-card:hover .map-image img {
            transform: scale(1.1);
        }

        .map-name {
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        /* Map View */
        #map-view {
            display: none;
            padding: 40px 0;
        }

        #map-view.active {
            display: block;
        }

        .map-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .map-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .map-instructions {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .map-instructions.highlight {
            color: var(--accent-green);
            font-weight: 600;
        }

        /* Category filter bar */
        .category-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .category-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(22, 27, 34, 0.85);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            letter-spacing: 0.3px;
        }

        .category-btn:hover {
            border-color: rgba(255,255,255,0.28);
            color: var(--text-primary);
        }

        .category-btn.active {
            color: #0d1117;
            border-color: transparent;
        }

        .category-btn.active.cat-smoke  { background: #58a6ff; color: #0d1117; }
        .category-btn.active.cat-flash  { background: #f0e060; color: #0d1117; }
        .category-btn.active.cat-molotov{ background: #f85149; color: #ffffff; }
        .category-btn.active.cat-he     { background: #3fb950; color: #0d1117; }
        .category-btn.active.cat-all    { background: #e6edf3; color: #0d1117; }

        .cat-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cat-smoke   .cat-dot { background: #58a6ff; }
        .cat-flash   .cat-dot { background: #f0e060; }
        .cat-molotov .cat-dot { background: #f85149; }
        .cat-he      .cat-dot { background: #3fb950; }
        .cat-all     .cat-dot { background: #e6edf3; }

        .category-btn.active .cat-dot { background: rgba(0,0,0,0.35); }

        /* Interactive Map Container */
        .interactive-map-container {
            max-width: 1000px;
            margin: 0 auto 40px;
            background: linear-gradient(145deg, rgba(22, 27, 34, 0.95), rgba(13, 17, 23, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(255, 255, 255, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .map-canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
        }

        .map-canvas {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .map-point {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }

        /* TARGET = orange, shown first (step 1) */
        .map-point.target {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            box-shadow: 0 0 20px rgba(247, 129, 102, 0.6);
        }

        /* START = green, hidden until target is selected (step 2) */
        .map-point.start {
            background: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.6);
            display: none;
        }

        .map-point.start.visible {
            display: flex;
        }

        .map-point:hover {
            transform: translate(-50%, -50%);
        }

        .map-point.selected {
            width: 24px;
            height: 24px;
            animation: none;
            box-shadow:
                0 0 0 3px rgba(255,255,255,0.9),
                0 0 18px rgba(63,185,80,0.85),
                0 0 36px rgba(63,185,80,0.45);
        }

        /* Route line */
        .route-line {
            position: absolute;
            left: 0;
            top: 0;
            height: 0;
            border-top: 2px dashed rgba(255, 255, 255, 0.75);
            transform-origin: 0 0;
            pointer-events: none;
            z-index: 1;
        }
        .route-line.hidden {
            display: none;
        }

        /* Lineup Results */
        .lineup-results {
            max-width: 1000px;
            margin: 0 auto;
            display: none;
        }

        .lineup-results.visible {
            display: block;
        }

        .lineup-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .lineup-header h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--accent-green);
        }

        .lineup-route {
            font-size: 18px;
            color: var(--text-secondary);
        }

        .lineup-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .lineup-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .lineup-item:hover {
            transform: translateY(-4px);
            border-color: var(--accent-green);
        }

        .lineup-media {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }

        .lineup-media img,
        .lineup-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lineup-description {
            padding: 20px;
        }

        .lineup-description h4 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--accent-orange);
        }

        .lineup-description p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        /* Footer */
        .site-footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 60px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title { font-size: 28px; }
            .map-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
            .map-title { font-size: 24px; }
            .lineup-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">CS2 Lineups</h1>
                <button id="back-btn" class="back-btn">Back to Map Selection</button>
            </div>
        </div>
    </header>

    <!-- Home View - Map Selection -->
    <div id="home-view">
        <main class="container">
            <h2 class="page-title">Select a Map</h2>
            <div class="map-grid" id="map-grid"></div>
        </main>
    </div>

    <!-- Map View - Interactive Lineup Viewer -->
    <div id="map-view">
        <main class="container">
            <div class="map-header">
                <h2 class="map-title" id="current-map-title"></h2>
                <p class="map-instructions" id="map-instructions">Select a target (orange)</p>
            </div>

            <!-- Category filter bar -->
            <div class="category-bar" id="category-bar">
                <button class="category-btn cat-all active" data-cat="all" onclick="toggleCategory('all')">
                    <span class="cat-dot"></span> All
                </button>
                <button class="category-btn cat-smoke" data-cat="smoke" onclick="toggleCategory('smoke')">
                    <span class="cat-dot"></span> Smoke
                </button>
                <button class="category-btn cat-flash" data-cat="flash" onclick="toggleCategory('flash')">
                    <span class="cat-dot"></span> Flash
                </button>
                <button class="category-btn cat-molotov" data-cat="molotov" onclick="toggleCategory('molotov')">
                    <span class="cat-dot"></span> Molotov
                </button>
                <button class="category-btn cat-he" data-cat="he" onclick="toggleCategory('he')">
                    <span class="cat-dot"></span> HE Grenade
                </button>
            </div>

            <div class="interactive-map-container">
                <div class="map-canvas-wrapper">
                    <div class="map-canvas" id="map-canvas"></div>
                </div>
            </div>

            <div class="lineup-results" id="lineup-results">
                <div class="lineup-header">
                    <h3>Lineup Found</h3>
                    <p class="lineup-route" id="lineup-route"></p>
                </div>
                <div class="lineup-content" id="lineup-content"></div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p><a href="https://steamcommunity.com/id/syntcs/" target="_blank" style="color: inherit; text-decoration: none;">https://steamcommunity.com/id/syntcs/</a></p>
        </div>
    </footer>

    <script>
        // Global state
        let lineupsData = null;
        let currentMap = null;
        let selectedTarget = null;
        let selectedStart = null;
        // activeCategories: set of enabled categories. Empty set = "all"
        let activeCategories = new Set(); // empty = all shown

        // ── Category filter ──────────────────────────────────────────────────────
        function toggleCategory(cat) {
            if (cat === 'all') {
                // Reset to all
                activeCategories.clear();
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector('.category-btn.cat-all').classList.add('active');
            } else {
                // Deactivate "All" button
                document.querySelector('.category-btn.cat-all').classList.remove('active');

                const btn = document.querySelector(`.category-btn[data-cat="${cat}"]`);
                if (activeCategories.has(cat)) {
                    activeCategories.delete(cat);
                    btn.classList.remove('active');
                } else {
                    activeCategories.add(cat);
                    btn.classList.add('active');
                }

                // If nothing selected -> back to "All"
                if (activeCategories.size === 0) {
                    document.querySelector('.category-btn.cat-all').classList.add('active');
                }
            }

            // Re-render map points for current state
            if (currentMap) {
                resetMapState();
            }
        }

        function isLineupVisible(lineup) {
            if (activeCategories.size === 0) return true;
            return activeCategories.has(lineup.type || 'smoke');
        }

        // ── Init ─────────────────────────────────────────────────────────────────
        async function init() {
            await loadLineups();
            renderMapGrid();
            setupEventListeners();
        }

        async function loadLineups() {
            try {
                const response = await fetch('lineups.json');
                lineupsData = await response.json();
            } catch (error) {
                console.error('[v0] Error loading lineups:', error);
            }
        }

        // ── Home ─────────────────────────────────────────────────────────────────
        function renderMapGrid() {
            const grid = document.getElementById('map-grid');
            grid.innerHTML = '';
            if (!lineupsData || !lineupsData.maps) return;

            lineupsData.maps.forEach(map => {
                const card = document.createElement('div');
                card.className = 'map-card';
                card.onclick = () => openMap(map.id, map.name);
                const imageUrl = map.previewImage || `public/images/maps/${map.id}.jpg`;
                card.innerHTML = `
                    <div class="map-image">
                        <img src="${imageUrl}" alt="${map.name}">
                    </div>
                    <h3 class="map-name">${map.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        // ── Open map ─────────────────────────────────────────────────────────────
        function openMap(mapId, mapName) {
            currentMap = mapId;
            selectedTarget = null;
            selectedStart = null;

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('map-view').classList.add('active');
            document.getElementById('back-btn').classList.add('visible');
            document.getElementById('current-map-title').textContent = mapName;
            setInstruction('Select a target (orange)', false);
            document.getElementById('lineup-results').classList.remove('visible');

            renderMapCanvas(mapId);
        }

        function setInstruction(text, highlight) {
            const el = document.getElementById('map-instructions');
            el.textContent = text;
            el.classList.toggle('highlight', highlight);
        }

        // ── Reset map to step 1 (target selection) ───────────────────────────────
        function resetMapState() {
            selectedTarget = null;
            selectedStart = null;
            setInstruction('Select a target (orange)', false);
            document.getElementById('lineup-results').classList.remove('visible');
            renderMapCanvas(currentMap);
        }

        // ── Route line ───────────────────────────────────────────────────────────
        function updateRouteLine() {
            const line = document.getElementById('route-line');
            if (!line) return;

            if (!selectedStart || !selectedTarget) {
                line.classList.add('hidden');
                return;
            }

            const x1 = selectedTarget.x, y1 = selectedTarget.y;
            const x2 = selectedStart.x,  y2 = selectedStart.y;
            const dx = x2 - x1, dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;

            line.style.left  = x1 + '%';
            line.style.top   = y1 + '%';
            line.style.width = length + '%';
            line.style.transform = `rotate(${angle}deg)`;
            line.classList.remove('hidden');
        }

        // ── Render canvas ─────────────────────────────────────────────────────────
        function renderMapCanvas(mapId) {
            const canvas = document.getElementById('map-canvas');
            const mapData = lineupsData.maps.find(m => m.id === mapId);
            if (!mapData) return;

            const overlayImage = mapData.overlayImage || `public/images/maps/${mapId}.jpg`;
            canvas.style.backgroundImage = `url('${overlayImage}')`;
            canvas.innerHTML = '';

            // Route line
            canvas.insertAdjacentHTML('beforeend', '<div id="route-line" class="route-line hidden"></div>');

            // Determine which targets have lineups for the active category filter
            const visibleTargetIds = new Set(
                mapData.lineups
                    .filter(l => isLineupVisible(l))
                    .map(l => l.to)
            );

            // STEP 1: Show target points (orange) that have lineups matching the current filter
            mapData.targetPoints.forEach(point => {
                if (!visibleTargetIds.has(point.id)) return;
                const pointEl = createMapPoint(point, 'target');
                pointEl.onclick = () => selectTargetPoint(point);
                canvas.appendChild(pointEl);
            });

            // STEP 2: Start points (green) hidden initially
            mapData.startPoints.forEach(point => {
                const pointEl = createMapPoint(point, 'start');
                pointEl.onclick = () => selectStartPoint(point);
                canvas.appendChild(pointEl);
            });

            updateRouteLine();
        }

        function createMapPoint(point, type) {
            const pointEl = document.createElement('div');
            pointEl.className = `map-point ${type}`;
            pointEl.style.left = `${point.x}%`;
            pointEl.style.top  = `${point.y}%`;
            pointEl.dataset.id = point.id;
            pointEl.textContent = point.label;
            return pointEl;
        }

        // ── Step 1: Select target (orange) ───────────────────────────────────────
        function selectTargetPoint(point) {
            selectedTarget = point;
            selectedStart  = null;

            // Highlight selected target
            document.querySelectorAll('.map-point.target').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.map-point.target[data-id="${point.id}"]`).classList.add('selected');

            // Clear any previous start selection
            document.querySelectorAll('.map-point.start').forEach(el => el.classList.remove('selected'));

            // Show only start points that have a matching lineup (and match category filter)
            const mapData = lineupsData.maps.find(m => m.id === currentMap);
            const availableStarts = mapData.lineups
                .filter(l => l.to === point.id && isLineupVisible(l))
                .map(l => l.from);

            document.querySelectorAll('.map-point.start').forEach(el => {
                if (availableStarts.includes(el.dataset.id)) {
                    el.classList.add('visible');
                } else {
                    el.classList.remove('visible');
                }
            });

            setInstruction('Now select your position (green)', true);
            document.getElementById('lineup-results').classList.remove('visible');
            updateRouteLine();
        }

        // ── Step 2: Select start (green) ─────────────────────────────────────────
        function selectStartPoint(point) {
            selectedStart = point;

            document.querySelectorAll('.map-point.start').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.map-point.start[data-id="${point.id}"]`).classList.add('selected');

            setInstruction('Lineup displayed', false);
            updateRouteLine();
            showLineupResults();
        }

        // ── Show lineup results ───────────────────────────────────────────────────
        function showLineupResults() {
            const mapData = lineupsData.maps.find(m => m.id === currentMap);
            if (!mapData) return;

            const lineup = mapData.lineups.find(l =>
                l.from === selectedStart.id && l.to === selectedTarget.id
            );

            if (!lineup || !lineup.media || lineup.media.length === 0) {
                document.getElementById('lineup-results').classList.remove('visible');
                setInstruction('No lineup available for this combination', false);
                return;
            }

            document.getElementById('lineup-route').textContent =
                `From ${selectedStart.name} to ${selectedTarget.name}`;

            const content = document.getElementById('lineup-content');
            content.innerHTML = '';

            lineup.media.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'lineup-item';

                let mediaHtml = '';
                if (item.type === 'image') {
                    mediaHtml = `<img src="${item.url}" alt="${item.description}">`;
                } else if (item.type === 'video') {
                    mediaHtml = `<video controls><source src="${item.url}" type="video/mp4"></video>`;
                }

                itemEl.innerHTML = `
                    <div class="lineup-media">${mediaHtml}</div>
                    <div class="lineup-description">
                        <h4>Step ${index + 1}</h4>
                        <p>${item.description}</p>
                    </div>
                `;
                content.appendChild(itemEl);
            });

            document.getElementById('lineup-results').classList.add('visible');
        }

        // ── Event listeners ───────────────────────────────────────────────────────
        function setupEventListeners() {
            document.getElementById('back-btn').onclick = () => {
                document.getElementById('home-view').style.display = 'block';
                document.getElementById('map-view').classList.remove('active');
                document.getElementById('back-btn').classList.remove('visible');
                currentMap    = null;
                selectedTarget = null;
                selectedStart  = null;
            };
        }

        init();
    </script>
</body>
</html>
