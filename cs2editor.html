<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Editor | syntcs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f78166;
            --border-color: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .site-header {
            background: var(--bg-secondary);
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .back-btn {
            background: rgba(33, 38, 45, 0.8);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: border-color 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Main */
        .main-content {
            padding: 40px 0 60px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .page-desc {
            color: var(--text-secondary);
            margin-bottom: 36px;
            font-size: 14px;
        }

        /* Sections */
        .section-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent-blue);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: #0d1117;
        }

        .btn-primary:hover {
            background: #79b8ff;
        }

        .btn-success {
            background: #238636;
            color: #ffffff;
        }

        .btn-success:hover {
            background: #2ea043;
        }

        .btn-danger {
            background: #b91c1c;
            color: #fee2e2;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        /* Card list */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .card-item-info {
            flex: 1;
            min-width: 0;
        }

        .card-item-title {
            font-weight: 600;
            color: var(--accent-blue);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-item-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .card-item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .card-item-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Toggle */
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        /* Add form */
        .add-form {
            background: var(--bg-tertiary);
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-top: 12px;
            display: none;
        }

        .add-form.visible {
            display: block;
        }

        .add-form-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        /* Save bar */
        .save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 200;
        }

        .save-bar-status {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .save-bar-status.saved {
            color: var(--accent-green);
        }

        .save-bar-status.unsaved {
            color: var(--accent-orange);
        }

        /* Edit overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay.visible {
            display: flex;
        }

        .overlay-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
        }

        .overlay-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .overlay-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        .badge-preview {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-left: 8px;
            vertical-align: middle;
        }

        .badge-preview.green  { background: #238636; color: #fff; }
        .badge-preview.orange { background: #b45309; color: #fef3c7; }
        .badge-preview.blue   { background: #1f6feb; color: #fff; }
        .badge-preview.red    { background: #b91c1c; color: #fee2e2; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <span class="logo">SYNTCS</span>
                <a href="index.html" class="back-btn">Back to Hub</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="page-title">Hub Editor</h1>
            <p class="page-desc">Edit the overview page — title, subtitle and cards.</p>

            <!-- General settings -->
            <div class="section-card">
                <div class="section-title">General</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="setting-title" placeholder="e.g. syntcs">
                    </div>
                    <div class="form-group">
                        <label>Subtitle</label>
                        <input type="text" id="setting-subtitle" placeholder="e.g. CS2 Tools &amp; Resources">
                    </div>
                </div>
            </div>

            <!-- Cards -->
            <div class="section-card">
                <div class="section-title">Cards</div>
                <div class="card-list" id="card-list"></div>

                <button class="btn btn-secondary" onclick="toggleAddForm()">+ Add Card</button>

                <div class="add-form" id="add-form">
                    <div class="add-form-title">New Card</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="new-title" placeholder="e.g. Lineups">
                        </div>
                        <div class="form-group">
                            <label>URL</label>
                            <input type="text" id="new-url" placeholder="e.g. lineups.html">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="new-desc" placeholder="Short description..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Badge Text (leave empty for none)</label>
                            <input type="text" id="new-badge" placeholder='e.g. NEW! or UPDATED!'>
                        </div>
                        <div class="form-group">
                            <label>Badge Color</label>
                            <select id="new-badge-color">
                                <option value="green">Green</option>
                                <option value="blue">Blue</option>
                                <option value="orange">Orange</option>
                                <option value="red">Red</option>
                            </select>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:12px;">
                        <button class="btn btn-secondary" onclick="toggleAddForm()">Cancel</button>
                        <button class="btn btn-success" onclick="addCard()">Add Card</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Edit overlay -->
    <div class="overlay" id="edit-overlay">
        <div class="overlay-box">
            <div class="overlay-title">Edit Card</div>
            <div class="form-row">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" id="edit-url">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="edit-desc"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Badge Text</label>
                    <input type="text" id="edit-badge">
                </div>
                <div class="form-group">
                    <label>Badge Color</label>
                    <select id="edit-badge-color">
                        <option value="green">Green</option>
                        <option value="blue">Blue</option>
                        <option value="orange">Orange</option>
                        <option value="red">Red</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="toggle-label">
                    <input type="checkbox" id="edit-enabled"> Card visible on hub
                </label>
            </div>
            <div class="overlay-actions">
                <button class="btn btn-secondary" onclick="closeEditOverlay()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditOverlay()">Save</button>
            </div>
        </div>
    </div>

    <!-- Save bar -->
    <div class="save-bar">
        <span class="save-bar-status" id="save-status">Loading...</span>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" onclick="exportJSON()">Export JSON</button>
            <button class="btn btn-primary" onclick="saveData()">Save Changes</button>
        </div>
    </div>

    <script>
        let data = { title: 'syntcs', subtitle: 'CS2 Tools & Resources', cards: [] };
        let editingIndex = -1;
        let unsaved = false;

        // Load
        async function loadData() {
            try {
                const res = await fetch('index-data.json?t=' + Date.now());
                data = await res.json();
                applyToForm();
                renderCards();
                setStatus('saved');
            } catch (e) {
                setStatus('unsaved');
            }
        }

        function applyToForm() {
            document.getElementById('setting-title').value = data.title || '';
            document.getElementById('setting-subtitle').value = data.subtitle || '';
        }

        function markUnsaved() {
            unsaved = true;
            setStatus('unsaved');
        }

        function setStatus(state) {
            const el = document.getElementById('save-status');
            if (state === 'saved') {
                el.textContent = 'All changes saved';
                el.className = 'save-bar-status saved';
                unsaved = false;
            } else if (state === 'unsaved') {
                el.textContent = 'Unsaved changes';
                el.className = 'save-bar-status unsaved';
            } else {
                el.textContent = state;
                el.className = 'save-bar-status';
            }
        }

        // Render card list
        function renderCards() {
            const list = document.getElementById('card-list');
            if (!data.cards || data.cards.length === 0) {
                list.innerHTML = '<div style="color:var(--text-secondary);font-size:13px;padding:8px 0;">No cards yet.</div>';
                return;
            }
            list.innerHTML = data.cards.map((card, i) => {
                const badgeHtml = card.badge
                    ? `<span class="badge-preview ${card.badgeColor || 'green'}">${card.badge}</span>`
                    : '';
                const visibility = card.enabled === false
                    ? '<span style="color:var(--accent-orange);font-size:11px;">[hidden]</span>'
                    : '';
                return `
                    <div class="card-item">
                        <div class="card-item-info">
                            <div class="card-item-title">${card.title}${badgeHtml} ${visibility}</div>
                            <div class="card-item-meta">${card.url || ''} &mdash; ${card.description || ''}</div>
                        </div>
                        <div class="card-item-actions">
                            <button class="btn btn-secondary" onclick="openEdit(${i})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteCard(${i})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Add form toggle
        function toggleAddForm() {
            const form = document.getElementById('add-form');
            form.classList.toggle('visible');
            if (form.classList.contains('visible')) {
                document.getElementById('new-title').focus();
            }
        }

        // Add card
        function addCard() {
            const title = document.getElementById('new-title').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const desc = document.getElementById('new-desc').value.trim();
            const badge = document.getElementById('new-badge').value.trim();
            const badgeColor = document.getElementById('new-badge-color').value;

            if (!title) {
                alert('Title is required');
                return;
            }

            data.cards.push({
                id: title.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now(),
                title,
                description: desc,
                url,
                badge,
                badgeColor,
                enabled: true
            });

            // Reset form
            ['new-title','new-url','new-desc','new-badge'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('new-badge-color').value = 'green';
            document.getElementById('add-form').classList.remove('visible');

            renderCards();
            markUnsaved();
        }

        // Edit overlay
        function openEdit(index) {
            editingIndex = index;
            const card = data.cards[index];
            document.getElementById('edit-title').value = card.title || '';
            document.getElementById('edit-url').value = card.url || '';
            document.getElementById('edit-desc').value = card.description || '';
            document.getElementById('edit-badge').value = card.badge || '';
            document.getElementById('edit-badge-color').value = card.badgeColor || 'green';
            document.getElementById('edit-enabled').checked = card.enabled !== false;
            document.getElementById('edit-overlay').classList.add('visible');
        }

        function closeEditOverlay() {
            document.getElementById('edit-overlay').classList.remove('visible');
            editingIndex = -1;
        }

        function saveEditOverlay() {
            if (editingIndex < 0) return;
            data.cards[editingIndex] = {
                ...data.cards[editingIndex],
                title: document.getElementById('edit-title').value.trim(),
                url: document.getElementById('edit-url').value.trim(),
                description: document.getElementById('edit-desc').value.trim(),
                badge: document.getElementById('edit-badge').value.trim(),
                badgeColor: document.getElementById('edit-badge-color').value,
                enabled: document.getElementById('edit-enabled').checked
            };
            closeEditOverlay();
            renderCards();
            markUnsaved();
        }

        // Delete
        function deleteCard(index) {
            if (!confirm('Delete this card?')) return;
            data.cards.splice(index, 1);
            renderCards();
            markUnsaved();
        }

        // Save
        async function saveData() {
            data.title = document.getElementById('setting-title').value.trim() || data.title;
            data.subtitle = document.getElementById('setting-subtitle').value.trim();

            try {
                const res = await fetch('save-index.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data, null, 2)
                });
                if (res.ok) {
                    setStatus('saved');
                } else {
                    throw new Error();
                }
            } catch (e) {
                // No server — offer download fallback
                exportJSON();
                setStatus('saved');
            }
        }

        // Export JSON (download)
        function exportJSON() {
            data.title = document.getElementById('setting-title').value.trim() || data.title;
            data.subtitle = document.getElementById('setting-subtitle').value.trim();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index-data.json';
            a.click();
        }

        // Mark unsaved on general field changes
        document.getElementById('setting-title').addEventListener('input', markUnsaved);
        document.getElementById('setting-subtitle').addEventListener('input', markUnsaved);

        // Close overlay on backdrop click
        document.getElementById('edit-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeEditOverlay();
        });

        loadData();
    </script>

</body>
</html>
