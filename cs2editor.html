<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Editor | syntcs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e14 0%, #121820 50%, #0d1117 100%);
      color: #e6edf3;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      color: #ffffff;
      letter-spacing: 4px;
      font-weight: 700;
      animation: subtleGlow 4s ease-in-out infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes subtleGlow {
      0%, 100% {
        text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 20px rgba(255,255,255,0.15);
      }
      50% {
        text-shadow: 0 0 15px rgba(255,255,255,0.4), 0 0 30px rgba(255,255,255,0.2);
      }
    }

    .subtitle {
      color: #8b949e;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    /* Section blocks */
    .editor-section {
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: 1.25rem;
      color: #f0f6fc;
      text-shadow: 0 0 8px rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
    }

    .section-title::before {
      content: "//";
      color: #58a6ff;
    }

    /* Glass box — same as config page */
    .config-box {
      background: linear-gradient(145deg, rgba(22,27,34,0.95), rgba(13,17,23,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.3),
        0 0 30px rgba(255,255,255,0.02),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Form elements */
    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      background: rgba(13,17,23,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      color: #e6edf3;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: rgba(88,166,255,0.5);
      box-shadow: 0 0 0 2px rgba(88,166,255,0.1);
    }

    select option {
      background: #161b22;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Buttons */
    .btn {
      background: rgba(33,38,45,0.8);
      color: #e6edf3;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      text-decoration: none;
    }

    .btn:hover {
      background: rgba(48,54,61,0.9);
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: rgba(31,111,235,0.25);
      border-color: rgba(88,166,255,0.4);
      color: #79c0ff;
    }

    .btn-primary:hover {
      background: rgba(31,111,235,0.4);
      border-color: rgba(88,166,255,0.6);
      box-shadow: 0 0 15px rgba(88,166,255,0.2);
    }

    .btn-danger {
      background: rgba(185,28,28,0.2);
      border-color: rgba(248,81,73,0.3);
      color: #f85149;
    }

    .btn-danger:hover {
      background: rgba(185,28,28,0.35);
      border-color: rgba(248,81,73,0.5);
      box-shadow: 0 0 12px rgba(248,81,73,0.2);
    }

    .btn-success {
      background: rgba(35,134,54,0.25);
      border-color: rgba(63,185,80,0.4);
      color: #3fb950;
    }

    .btn-success:hover {
      background: rgba(35,134,54,0.4);
      border-color: rgba(63,185,80,0.6);
      box-shadow: 0 0 15px rgba(63,185,80,0.2);
    }

    /* Cards list */
    .card-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(13,17,23,0.6);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .card-item-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      flex: 1;
      min-width: 0;
    }

    .card-item-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #79c0ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-item-url {
      font-size: 0.78rem;
      color: #6e7681;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-item-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-green { background: #238636; color: #fff; }
    .badge-orange { background: #b45309; color: #fef3c7; }
    .badge-blue { background: #1f6feb; color: #fff; }
    .badge-red { background: #b91c1c; color: #fee2e2; }

    .card-item-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .disabled-tag {
      font-size: 10px;
      color: #6e7681;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* Divider + save row */
    .save-row {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 -1px 20px rgba(255,255,255,0.03);
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .save-all-btn {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(135deg, #f0f6fc 0%, #c9d1d9 100%);
      color: #0d1117;
      border: none;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(255,255,255,0.1), 0 0 30px rgba(255,255,255,0.05);
    }

    .save-all-btn:hover {
      background: linear-gradient(135deg, #ffffff 0%, #e6edf3 100%);
      box-shadow: 0 4px 20px rgba(255,255,255,0.2), 0 0 40px rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .save-all-btn.saved {
      background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
      color: #fff;
      box-shadow: 0 0 25px rgba(35,134,54,0.4);
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #6e7681;
      font-size: 0.875rem;
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* Edit overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-box {
      background: linear-gradient(145deg, rgba(22,27,34,0.98), rgba(13,17,23,1));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(88,166,255,0.04);
    }

    .overlay-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .overlay-title::before {
      content: "//";
      color: #58a6ff;
    }

    .overlay-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .empty-state {
      text-align: center;
      color: #6e7681;
      font-size: 0.875rem;
      padding: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>HUB EDITOR</h1>
      <p class="subtitle">Manage your CS2 hub pages</p>
    </header>

    <!-- General Settings -->
    <div class="editor-section">
      <div class="section-header">
        <h2 class="section-title">General Settings</h2>
      </div>
      <div class="config-box">
        <div class="form-row">
          <div class="form-group">
            <label>Page Title</label>
            <input type="text" id="page-title" placeholder="syntcs">
          </div>
          <div class="form-group">
            <label>Subtitle</label>
            <input type="text" id="page-subtitle" placeholder="CS2 Tools & Resources">
          </div>
        </div>
      </div>
    </div>

    <!-- Cards List -->
    <div class="editor-section">
      <div class="section-header">
        <h2 class="section-title">Pages</h2>
        <button class="btn btn-primary" onclick="openAddOverlay()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Page
        </button>
      </div>
      <div class="config-box">
        <ul class="card-list" id="card-list">
          <li class="empty-state">No pages yet. Click "Add Page" to start.</li>
        </ul>
      </div>
    </div>

    <!-- Save -->
    <div class="save-row">
      <button class="save-all-btn" id="save-btn" onclick="saveData()">SAVE CHANGES</button>
    </div>

    <footer>
      <a href="index.html">← Back to Hub</a>
    </footer>
  </div>

  <!-- Add / Edit Overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <div class="overlay-title" id="overlay-title">Add Page</div>
      <input type="hidden" id="edit-index">

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="card-title" placeholder="e.g. Lineups">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="card-desc" placeholder="Short description">
      </div>
      <div class="form-group">
        <label>URL</label>
        <input type="text" id="card-url" placeholder="e.g. lineups.html">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Badge Text (optional)</label>
          <input type="text" id="card-badge" placeholder="e.g. NEW!">
        </div>
        <div class="form-group">
          <label>Badge Color</label>
          <select id="card-badge-color">
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="orange">Orange</option>
            <option value="red">Red</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Visible</label>
        <select id="card-enabled">
          <option value="true">Yes</option>
          <option value="false">No (hidden)</option>
        </select>
      </div>

      <div class="overlay-actions">
        <button class="btn" onclick="closeOverlay()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCard()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let data = { title: 'syntcs', subtitle: 'CS2 Tools & Resources', cards: [] };
    let editingIndex = -1;

    async function loadData() {
      try {
        const res = await fetch('index-data.json?t=' + Date.now());
        data = await res.json();
      } catch (e) {
        // use defaults
      }
      document.getElementById('page-title').value = data.title || '';
      document.getElementById('page-subtitle').value = data.subtitle || '';
      renderList();
    }

    function renderList() {
      const list = document.getElementById('card-list');
      if (!data.cards || data.cards.length === 0) {
        list.innerHTML = '<li class="empty-state">No pages yet. Click "Add Page" to start.</li>';
        return;
      }
      list.innerHTML = data.cards.map((card, i) => {
        const badgeHtml = card.badge
          ? `<span class="card-item-badge badge-${card.badgeColor || 'green'}">${card.badge}</span>`
          : '';
        const disabledHtml = card.enabled === false ? '<span class="disabled-tag">hidden</span>' : '';
        return `
          <li class="card-item">
            <div class="card-item-info">
              <span class="card-item-title">${card.title}</span>
              <span class="card-item-url">${card.url || ''}</span>
            </div>
            ${badgeHtml}
            ${disabledHtml}
            <div class="card-item-actions">
              <button class="btn" onclick="openEditOverlay(${i})">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Edit
              </button>
              <button class="btn btn-danger" onclick="deleteCard(${i})">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                  <path d="M10 11v6M14 11v6"></path>
                </svg>
                Delete
              </button>
            </div>
          </li>
        `;
      }).join('');
    }

    function openAddOverlay() {
      editingIndex = -1;
      document.getElementById('overlay-title').textContent = 'Add Page';
      document.getElementById('edit-index').value = '';
      document.getElementById('card-title').value = '';
      document.getElementById('card-desc').value = '';
      document.getElementById('card-url').value = '';
      document.getElementById('card-badge').value = '';
      document.getElementById('card-badge-color').value = 'green';
      document.getElementById('card-enabled').value = 'true';
      document.getElementById('overlay').classList.add('active');
    }

    function openEditOverlay(index) {
      editingIndex = index;
      const card = data.cards[index];
      document.getElementById('overlay-title').textContent = 'Edit Page';
      document.getElementById('edit-index').value = index;
      document.getElementById('card-title').value = card.title || '';
      document.getElementById('card-desc').value = card.description || '';
      document.getElementById('card-url').value = card.url || '';
      document.getElementById('card-badge').value = card.badge || '';
      document.getElementById('card-badge-color').value = card.badgeColor || 'green';
      document.getElementById('card-enabled').value = card.enabled === false ? 'false' : 'true';
      document.getElementById('overlay').classList.add('active');
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('active');
    }

    function saveCard() {
      const title = document.getElementById('card-title').value.trim();
      if (!title) {
        alert('Title is required.');
        return;
      }
      const card = {
        id: title.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now(),
        title,
        description: document.getElementById('card-desc').value.trim(),
        url: document.getElementById('card-url').value.trim(),
        badge: document.getElementById('card-badge').value.trim(),
        badgeColor: document.getElementById('card-badge-color').value,
        enabled: document.getElementById('card-enabled').value !== 'false'
      };

      if (editingIndex >= 0) {
        card.id = data.cards[editingIndex].id || card.id;
        data.cards[editingIndex] = card;
      } else {
        data.cards.push(card);
      }

      renderList();
      closeOverlay();
    }

    function deleteCard(index) {
      if (!confirm('Delete this page?')) return;
      data.cards.splice(index, 1);
      renderList();
    }

    async function saveData() {
      data.title = document.getElementById('page-title').value.trim() || 'syntcs';
      data.subtitle = document.getElementById('page-subtitle').value.trim();

      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index-data.json';
      a.click();
      URL.revokeObjectURL(url);

      const btn = document.getElementById('save-btn');
      btn.textContent = 'DOWNLOADED!';
      btn.classList.add('saved');
      setTimeout(() => {
        btn.textContent = 'SAVE CHANGES';
        btn.classList.remove('saved');
      }, 2500);
    }

    // Close overlay on backdrop click
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) closeOverlay();
    });

    loadData();
  </script>
</body>
</html>
